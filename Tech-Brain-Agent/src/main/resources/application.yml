#配置Mysql
spring:
  application:
    name: springboot-agent

  datasource:
    url: jdbc:mysql://localhost:3306/agent
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD}
      # 文件上传大小限制配置
  servlet:
    multipart:
      max-file-size: 10MB      # 限制单个文件最大为 10MB (原来默认才 1MB)
      max-request-size: 100MB   # 限制单次请求的总大小为 50MB

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 1
      lettuce:
        pool:
          max-active: 8

mybatis-plus:
  configuration:
    # 打印 SQL 日志到控制台（开发环境必备）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启数据库下划线字段到 Java 驼峰属性的映射（MP 默认开启，显式配置更清晰）
    map-underscore-to-camel-case: true
#   Mapper扫描配置
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.agent.entity
  global-config:
    db-config:
      id-type:
      logic-delete-field:  #配置逻辑删除字段

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  override-with-generic-response: false

#阿里云配置
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: java-zwj
    region: cn-beijing

gemini:
  api-key: ${GEMINI_API_KEY}

deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  base-url: https://api.deepseek.com/v1
  model-name: deepseek-v4-pro
  temperature: 0.7
  timeout-seconds: 120

milvus:
  host: localhost
  port: 19530
  collection-name: article_vector
  dimension: 512
