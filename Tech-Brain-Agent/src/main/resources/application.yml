#配置Mysql
spring:
  application:
    name: springboot-agent

  datasource:
    url: jdbc:mysql://localhost:3306/agent
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD}
      # 文件上传大小限制配置
  servlet:
    multipart:
      max-file-size: 20MB      # 限制单个文件最大为 20MB，和 techbrain.file.max-size-mb 保持一致
      max-request-size: 100MB   # 限制单次请求的总大小为 100MB

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 1
      lettuce:
        pool:
          max-active: 8

mybatis-plus:
  configuration:
    # 打印 SQL 日志到控制台（开发环境必备）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启数据库下划线字段到 Java 驼峰属性的映射（MP 默认开启，显式配置更清晰）
    map-underscore-to-camel-case: true
#   Mapper扫描配置
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.agent.entity
  global-config:
    db-config:
      id-type:
      logic-delete-field:  #配置逻辑删除字段

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  override-with-generic-response: false

#阿里云配置
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: java-zwj
    region: cn-beijing

gemini:
  api-key: ${GEMINI_API_KEY:}

deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  base-url: https://api.deepseek.com/v1
  model-name: deepseek-v4-pro
  temperature: 0.7
  timeout-seconds: 120

milvus:
  host: localhost
  port: 19530
  collection-name: article_vector
  dimension: 512

techbrain:
  file:
    upload-dir: ./data/uploads
    max-size-mb: 20
    allowed-extensions:
      - pdf
      - doc
      - docx
      - txt
      - md
      - png
      - jpg
      - jpeg
      - webp
      - py
      - java
      - vue
      - sql
      - js
      - ts
      - json
      - xml
      - html
      - css
      - yml
      - yaml
      - properties
    allowed-mime-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain
      - text/markdown
      - image/png
      - image/jpeg
      - image/webp
      - text/x-python
      - text/x-java-source
      - text/x-vue
      - text/x-sql
      - application/javascript
      - text/javascript
      - application/x-javascript
      - text/typescript
      - application/typescript
      - application/json
      - application/xml
      - text/xml
      - text/html
      - text/css
      - application/x-yaml
      - text/yaml
      - text/x-yaml
      - text/x-java-properties
      - application/octet-stream
  project:
    workspace-dir: D:/JavaAgent/Tech-Brain
    max-file-size-kb: 512
    max-read-chars: 50000
    allowed-extensions:
      - java
      - kt
      - kts
      - groovy
      - scala
      - py
      - ipynb
      - js
      - jsx
      - ts
      - tsx
      - vue
      - svelte
      - go
      - rs
      - c
      - h
      - cpp
      - cc
      - cxx
      - hpp
      - hxx
      - cs
      - csproj
      - sln
      - php
      - rb
      - swift
      - m
      - mm
      - sql
      - sh
      - bash
      - zsh
      - ps1
      - bat
      - cmd
      - html
      - css
      - scss
      - less
      - xml
      - json
      - yaml
      - yml
      - properties
      - toml
      - ini
      - env.example
      - md
      - txt
    blocked-filenames:
      - .env
      - .env.local
      - .env.production
      - application-prod.yml
      - application-prod.yaml
      - application-secret.yml
      - application-secret.yaml
      - bootstrap-prod.yml
      - bootstrap-prod.yaml
      - id_rsa
      - id_rsa.pub
      - known_hosts
      - authorized_keys
      - config.php
      - settings.py
    blocked-extensions:
      - pem
      - key
      - p12
      - pfx
      - jks
      - keystore
      - crt
      - cer
      - der
      - class
      - jar
      - war
      - ear
      - exe
      - dll
      - so
      - dylib
      - zip
      - rar
      - 7z
