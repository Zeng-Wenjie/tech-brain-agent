# 后端服务端口：默认 8081（原 8080 在本机会被 WSL2/Hyper-V 动态保留导致无法绑定）；可用 SERVER_PORT 环境变量覆盖。
server:
  port: ${SERVER_PORT:8081}
  tomcat:
    # 配合 multipart 不限大小：避免 Tomcat 因 maxSwallowSize / 表单大小限制在大项目整包上传时中断连接。
    max-swallow-size: -1
    max-http-form-post-size: -1

#配置Mysql
spring:
  application:
    name: springboot-agent

  datasource:
    url: jdbc:mysql://localhost:3306/agent
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD}
      # 文件上传大小限制配置
  servlet:
    multipart:
      # 不限制 multipart 上传大小：自迭代沙箱（/api/self-dev/project/upload）需要整包导入大项目。
      # 普通用户文件上传仍由 UserFileServiceImpl.validateFileSize 按 techbrain.file.max-size-mb(20MB) 在代码层兜底。
      max-file-size: -1
      max-request-size: -1

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 1
      lettuce:
        pool:
          max-active: 8

mybatis-plus:
  configuration:
    # 打印 SQL 日志到控制台（开发环境必备）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启数据库下划线字段到 Java 驼峰属性的映射（MP 默认开启，显式配置更清晰）
    map-underscore-to-camel-case: true
#   Mapper扫描配置
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.agent.entity
  global-config:
    db-config:
      id-type:
      logic-delete-field:  #配置逻辑删除字段

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  override-with-generic-response: false

#阿里云配置
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: java-zwj
    region: cn-beijing

gemini:
  api-key: ${GEMINI_API_KEY:}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com/v1
  model-name: deepseek-v4-pro
  temperature: 0.7
  timeout-seconds: 120

milvus:
  host: localhost
  port: 19530
  collection-name: article_vector
  dimension: 512

techbrain:
  file:
    upload-dir: ./data/uploads
    max-size-mb: 20
    allowed-extensions:
      - pdf
      - doc
      - docx
      - txt
      - md
      - png
      - jpg
      - jpeg
      - webp
      - py
      - java
      - vue
      - sql
      - js
      - ts
      - json
      - xml
      - html
      - css
      - yml
      - yaml
      - properties
    allowed-mime-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain
      - text/markdown
      - image/png
      - image/jpeg
      - image/webp
      - text/x-python
      - text/x-java-source
      - text/x-vue
      - text/x-sql
      - application/javascript
      - text/javascript
      - application/x-javascript
      - text/typescript
      - application/typescript
      - application/json
      - application/xml
      - text/xml
      - text/html
      - text/css
      - application/x-yaml
      - text/yaml
      - text/x-yaml
      - text/x-java-properties
      - application/octet-stream
  self-dev:
    sandbox-workspace-dir: ${TECHBRAIN_SELF_DEV_SANDBOX:D:/JavaAgent/Tech-Brain-sandbox}
    owner-user-ids: []
    owner-usernames: []
    owner-store-file: ${TECHBRAIN_SELF_DEV_OWNER_STORE:./data/self-dev-owner.properties}
    owner-bootstrap-enabled: ${TECHBRAIN_SELF_DEV_OWNER_BOOTSTRAP_ENABLED:true}
    owner-bootstrap-local-only: true
    claude-code:
      executable: ${CLAUDE_CODE_EXECUTABLE:claude}
      arguments:
        - -p
      timeout-seconds: 900
      auth-status-timeout-seconds: 15
