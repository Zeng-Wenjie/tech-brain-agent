# 后端服务端口：默认 8081（原 8080 在本机会被 WSL2/Hyper-V 动态保留导致无法绑定）；可用 SERVER_PORT 环境变量覆盖。
server:
  port: ${SERVER_PORT:8081}
  tomcat:
    # 配合 multipart 不限大小：避免 Tomcat 因 maxSwallowSize / 表单大小限制在大项目整包上传时中断连接。
    max-swallow-size: -1
    max-http-form-post-size: -1

#配置Mysql
spring:
  application:
    name: springboot-agent

  datasource:
    url: jdbc:mysql://localhost:3306/agent
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD}
      # 文件上传大小限制配置
  servlet:
    multipart:
      # 不限制 multipart 上传大小：自迭代沙箱（/api/self-dev/project/upload）需要整包导入大项目。
      # 普通用户文件上传仍由 UserFileServiceImpl.validateFileSize 按 techbrain.file.max-size-mb(20MB) 在代码层兜底。
      max-file-size: -1
      max-request-size: -1

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 1
      lettuce:
        pool:
          max-active: 8

mybatis-plus:
  configuration:
    # 打印 SQL 日志到控制台（开发环境必备）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启数据库下划线字段到 Java 驼峰属性的映射（MP 默认开启，显式配置更清晰）
    map-underscore-to-camel-case: true
#   Mapper扫描配置
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.agent.entity
  global-config:
    db-config:
      id-type:
      logic-delete-field:  #配置逻辑删除字段

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  override-with-generic-response: false

#阿里云配置
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: java-zwj
    region: cn-beijing

gemini:
  api-key: ${GEMINI_API_KEY:}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com/v1
  model-name: deepseek-v4-pro
  temperature: 0.7
  timeout-seconds: 120

milvus:
  host: localhost
  port: 19530
  collection-name: article_vector
  dimension: 512

techbrain:
  file:
    upload-dir: ./data/uploads
    max-size-mb: 20
    allowed-extensions:
      - pdf
      - doc
      - docx
      - txt
      - md
      - png
      - jpg
      - jpeg
      - webp
      - py
      - java
      - vue
      - sql
      - js
      - ts
      - json
      - xml
      - html
      - css
      - yml
      - yaml
      - properties
    allowed-mime-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain
      - text/markdown
      - image/png
      - image/jpeg
      - image/webp
      - text/x-python
      - text/x-java-source
      - text/x-vue
      - text/x-sql
      - application/javascript
      - text/javascript
      - application/x-javascript
      - text/typescript
      - application/typescript
      - application/json
      - application/xml
      - text/xml
      - text/html
      - text/css
      - application/x-yaml
      - text/yaml
      - text/x-yaml
      - text/x-java-properties
      - application/octet-stream
  selfdev:
    workspace:
      # P9 沙箱 workspace 根目录。生产环境请配置到 source-repo-dir 和服务运行目录之外。
      sandbox-root: ${TECHBRAIN_SELFDEV_WORKSPACE_ROOT:../selfdev-workspaces}
      # 当前真实项目源码目录，仅作为 LOCAL_COPY 只读来源，禁止写入。
      source-repo-dir: ${TECHBRAIN_SELFDEV_SOURCE_REPO_DIR:.}
      # 可选 Git 远程地址；为空时 GIT_CLONE 会被拒绝。
      git-remote-url: ${TECHBRAIN_SELFDEV_GIT_REMOTE_URL:}
      default-branch: ${TECHBRAIN_SELFDEV_DEFAULT_BRANCH:main}
      workspace-prefix: ${TECHBRAIN_SELFDEV_WORKSPACE_PREFIX:selfdev-}
      branch-prefix: ${TECHBRAIN_SELFDEV_BRANCH_PREFIX:selfdev/}
      max-workspaces: ${TECHBRAIN_SELFDEV_MAX_WORKSPACES:20}
      retention-days: ${TECHBRAIN_SELFDEV_RETENTION_DAYS:7}
      max-operation-timeout-seconds: ${TECHBRAIN_SELFDEV_MAX_OPERATION_TIMEOUT_SECONDS:120}
      allow-local-copy: ${TECHBRAIN_SELFDEV_ALLOW_LOCAL_COPY:true}
      allow-git-clone: ${TECHBRAIN_SELFDEV_ALLOW_GIT_CLONE:true}
      protect-source-repo: ${TECHBRAIN_SELFDEV_PROTECT_SOURCE_REPO:true}
    patch:
      default-allowed-directories:
        - Tech-Brain-Notes/src/main/java
        - Tech-Brain-Notes/src/main/resources
        - business-plugins
      protected-directories:
        - Tech-Brain-Agent/src/main/java/com/agent/security
        - Tech-Brain-Agent/src/main/java/com/agent/tool
        - Tech-Brain-Agent/src/main/java/com/agent/config
        - Tech-Brain-Agent/src/main/java/com/agent/selfdev
        - Tech-Brain-Agent/src/main/resources
      blocked-file-names:
        - .env
        - .env.local
        - .env.production
        - application-prod.yml
        - application-secret.yml
        - bootstrap-prod.yml
        - id_rsa
        - id_dsa
        - id_ecdsa
        - id_ed25519
        - authorized_keys
      blocked-extensions:
        - .pem
        - .key
        - .p12
        - .pfx
        - .jks
        - .keystore
        - .crt
        - .cer
        - .der
      backup-root: ${TECHBRAIN_SELFDEV_PATCH_BACKUP_ROOT:../selfdev-backups}
      max-changed-files: ${TECHBRAIN_SELFDEV_PATCH_MAX_CHANGED_FILES:50}
      max-patch-size-kb: ${TECHBRAIN_SELFDEV_PATCH_MAX_SIZE_KB:1024}
      max-operation-timeout-seconds: ${TECHBRAIN_SELFDEV_PATCH_TIMEOUT_SECONDS:120}
    compile:
      maven:
        executable: ${TECHBRAIN_SELFDEV_MAVEN_EXECUTABLE:mvn}
        default-timeout-seconds: ${TECHBRAIN_SELFDEV_MAVEN_DEFAULT_TIMEOUT_SECONDS:180}
        max-timeout-seconds: ${TECHBRAIN_SELFDEV_MAVEN_MAX_TIMEOUT_SECONDS:600}
        default-skip-tests: ${TECHBRAIN_SELFDEV_MAVEN_DEFAULT_SKIP_TESTS:true}
        max-output-chars: ${TECHBRAIN_SELFDEV_MAVEN_MAX_OUTPUT_CHARS:60000}
        max-error-summary-chars: ${TECHBRAIN_SELFDEV_MAVEN_MAX_ERROR_SUMMARY_CHARS:12000}
        allowed-extra-args:
          - -q
          - -U
          - -e
          - -X
  self-dev:
    sandbox-workspace-dir: ${TECHBRAIN_SELF_DEV_SANDBOX:D:/JavaAgent/Tech-Brain-sandbox}
    owner-user-ids: []
    owner-usernames: []
    owner-store-file: ${TECHBRAIN_SELF_DEV_OWNER_STORE:./data/self-dev-owner.properties}
    owner-bootstrap-enabled: ${TECHBRAIN_SELF_DEV_OWNER_BOOTSTRAP_ENABLED:true}
    owner-bootstrap-local-only: true
    claude-code:
      executable: ${CLAUDE_CODE_EXECUTABLE:claude}
      arguments:
        - -p
      timeout-seconds: 900
      auth-status-timeout-seconds: 15
